<div class="container mt-4">
  <h2>Available Books</h2>
  <div class="row">
    <div class="col-md-4 mb-3" *ngFor="let book of books">
      <div class="card h-100">
        <div class="card-body">
          <h5 class="card-title">{{book.title}}</h5>
          <h6 class="card-subtitle mb-2 text-muted">{{book.author}}</h6>
          <p class="card-text">
            ISBN: {{book.isbn}}<br>
            Price: ${{book.price}}<br>
            Stock: {{book.stockQuantity}}
          </p>
          <div class="form-group">
            <label for="quantity-{{book.isbn}}">Quantity:</label>
            <input type="number" class="form-control" id="quantity-{{book.isbn}}" 
                   [(ngModel)]="quantities[book.isbn]" min="1" [max]="book.stockQuantity">
          </div>
          <button class="btn btn-primary mt-2" 
                  (click)="orderBook(book.isbn)"
                  [disabled]="!quantities[book.isbn] || quantities[book.isbn] > book.stockQuantity">
            Order
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Pagination -->
  <nav *ngIf="totalPages > 1" aria-label="Book navigation">
    <ul class="pagination">
      <li class="page-item" [class.disabled]="currentPage === 1">
        <a class="page-link" (click)="goToPage(currentPage - 1)" aria-label="Previous">
          <span aria-hidden="true">&laquo;</span>
        </a>
      </li>
      <li class="page-item" *ngFor="let page of pages" [class.active]="page === currentPage">
        <a class="page-link" (click)="goToPage(page)">{{page}}</a>
      </li>
      <li class="page-item" [class.disabled]="currentPage === totalPages">
        <a class="page-link" (click)="goToPage(currentPage + 1)" aria-label="Next">
          <span aria-hidden="true">&raquo;</span>
        </a>
      </li>
    </ul>
  </nav>

  <div class="text-center mt-3">
    <small class="text-muted">
      Showing {{(currentPage - 1) * itemsPerPage + 1}} - {{Math.min(currentPage * itemsPerPage, totalBooks)}} of {{totalBooks}} books
    </small>
  </div>
</div>
